name: Go package

on:
  push:         {branches: [main]}
  pull_request: {branches: [main]}

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: 'stable'
          cache: 'true'

      - name: Lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: 'v2.12.2'

      - name: Test
        run: go test ./... -v

      - name: Test with race
        run: go test -timeout 90s -race ./...

